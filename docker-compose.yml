version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: vpn-deploy-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-vpn_root_password}
      MYSQL_DATABASE: ${DB_NAME:-vpn_deploy}
      MYSQL_USER: ${DB_USER:-vpn_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-vpn_password}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vpn-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vpn-deploy-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      PORT: 3001
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: ${DB_USER:-vpn_user}
      DB_PASSWORD: ${DB_PASSWORD:-vpn_password}
      DB_DATABASE: ${DB_NAME:-vpn_deploy}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-1h}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      CACHE_TTL: ${CACHE_TTL:-3600}
      SSH_POOL_MIN: ${SSH_POOL_MIN:-2}
      SSH_POOL_MAX: ${SSH_POOL_MAX:-10}
      THROTTLER_TTL: ${THROTTLER_TTL:-60000}
      THROTTLER_LIMIT: ${THROTTLER_LIMIT:-100}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - vpn-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vpn-deploy-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    environment:
      VITE_API_URL: /api
      VITE_SOCKET_URL: http://localhost:3001
    depends_on:
      - backend
    networks:
      - vpn-network

volumes:
  mysql_data:
    driver: local

networks:
  vpn-network:
    driver: bridge
